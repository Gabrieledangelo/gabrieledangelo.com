<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Official website of Gabriele D'Angelo">
<link rel="stylesheet" href="style.css">
<title>Gabriele D'Angelo</title></head><body class="home-page"><header class="site-header">
<a class="brand" href="index.html">Gabriele D'Angelo</a>
<nav class="site-nav">
<a href="about.html">About</a>
<a href="projects.html">Projects</a>
<a href="stories.html">Stories</a>
<a href="contact.html">Contact</a>
</nav>
</header>
<main class="hero"><div class="hero-bg"></div>
<div class="hero-copy"><h1>Original songs born<br>where silence was no longer enough.</h1></div>
</main>

<section class="featured-songs" aria-labelledby="featured-songs-title">
  <h2 id="featured-songs-title">Featured Songs</h2>

  <div class="song-grid">
    <article class="song-card">
      <img
        src="assets/songs/fighting-for-your-life.jpg"
        alt="Fighting For Your Life cover"
      >
      <div class="song-info">
        <h3>Fighting For Your Life</h3>
        <audio controls preload="none">
          <source
            src="assets/songs/fighting-for-your-life.mp3"
            type="audio/mpeg"
          >
        </audio>
      </div>
    </article>

    <article class="song-card">
      <img
        src="assets/songs/another-beer-one-kiss-another-lie.jpg"
        alt="Another Beer, One Kiss, Another Lie cover"
      >
      <div class="song-info">
        <h3>Another Beer, One Kiss, Another Lie</h3>
        <audio controls preload="none">
          <source
            src="assets/songs/another-beer-one-kiss-another-lie.mp3"
            type="audio/mpeg"
          >
        </audio>
      </div>
    </article>

    <article class="song-card">
      <img
        src="assets/songs/at-the-end-of-the-days.jpg"
        alt="At the End of the Days cover"
      >
      <div class="song-info">
        <h3>At the End of the Days</h3>
        <audio controls preload="none">
          <source
            src="assets/songs/at-the-end-of-the-days.mp3"
            type="audio/mpeg"
          >
        </audio>
      </div>
    </article>
  </div>
</section>

<script>
  const audioPlayers = document.querySelectorAll("audio");

  audioPlayers.forEach((player) => {
    player.addEventListener("play", () => {
      audioPlayers.forEach((otherPlayer) => {
        if (otherPlayer !== player) {
          otherPlayer.pause();
        }
      });
    });
  });
</script>

</body>
</html>
